/ MONTIAI App-Level Gradle Build Script
  // File: app/build.gradle
  
  plugins {
      id 'com.android.application'
      id 'org.jetbrains.kotlin.android'
      id 'maven-publish'
  }
  
  android {
      namespace 'com.montiai.app'
      compileSdk 34
  
      defaultConfig {
          applicationId 'com.montiai.app'
          minSdk 24
          targetSdk 34
          versionCode 1
          versionName '1.0'
          
          testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
      }
  
      buildTypes {
          release {
              minifyEnabled false
              proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
              
              // MONTIAI Signing configuration for release builds
              signingConfig signingConfigs.debug // Replace with proper signing config
          }
          debug {
              applicationIdSuffix '.debug'
              versionNameSuffix '-DEBUG'
          }
      }
      
      compileOptions {
          sourceCompatibility JavaVersion.VERSION_17
          targetCompatibility JavaVersion.VERSION_17
      }
      
      kotlinOptions {
          jvmTarget = '17'
      }
      
      buildFeatures {
          viewBinding true
      }
  }
  
  dependencies {
      implementation 'androidx.core:core-ktx:1.12.0'
      implementation 'androidx.appcompat:appcompat:1.6.1'
      implementation 'com.google.android.material:material:1.10.0'
      implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
      
      testImplementation 'junit:junit:4.13.2'
      androidTestImplementation 'androidx.test.ext:junit:1.1.5'
      androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
  }
  
  // MONTIAI Publishing Configuration for GitHub Packages
  afterEvaluate {
      publishing {
          publications {
              release(MavenPublication) {
                  from components.release
                  
                  groupId = 'com.montiai'
                  artifactId = 'montiai-sdk'
                  version = '1.0.0'
                  
                  pom {
                      name = 'MONTIAI SDK'
                      description = 'MONTI-DROID System SDK for JOHNCHARLESMONTI_021189MJ2911'
                      url = 'https://github.com/montiai/AppManager.montiai.com'
                  }
              }
          }
          
          repositories {
              maven {
                  name = 'GitHubPackages'
                  url = uri('https://maven.pkg.github.com/montiai/montiai-sdk')
                  credentials {
                      username = System.getenv('USERNAME') ?: project.findProperty('gpr.user')
                      password = System.getenv('TOKEN') ?: project.findProperty('gpr.token')
                  }
              }
          }
      }
  }
