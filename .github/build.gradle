  // MONTIAI Gradle Build Script for MONTIAI montiai.com
  // Generated by MONTI-DROID System
  // File: build.gradle (root level)
  
  plugins {
      id 'com.android.application' version '8.1.0' apply false
      id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
      id 'maven-publish'
  }
  
  group = 'com.montiai'
  version = '1.0.0'
  
  allprojects {
      repositories {
          google()
          mavenCentral()
          maven { url 'https://pkgs.dev.azure.com/montiai/_packaging/montiai/maven/v1' }
      }
  }
  
  // MONTIAI Root project configuration
  ext {
      compileSdkVersion = 34
      minSdkVersion = 24
      targetSdkVersion = 34
      versionCode = 1
      versionName = '1.0.0'
  }
  
  // MONTI Custom Task for MONTI-Workflow Integration
  task MONTI_DeployToSDCard(type: Exec) {
      description = 'MONTIAI Deploy APK to SDCard for Monti-Droid'
      group = 'MONTI-DROID'
      
      doFirst {
          println "========================================="
          println "MONTIAI Deploying APK to SDCard"
          println "MONTIAI Protecting JOHNCHARLESMONTI_021189MJ2911"
          println "========================================="
      }
      
      commandLine 'bash', '-c', '''
          mkdir -p /sdcard/MONTI_DROID_DATA 2>/dev/null || mkdir -p ~/MONTI_DROID_DATA
          cp app/build/outputs/apk/release/app-release.apk /sdcard/MONTI_DROID_DATA/MontiDroid.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/app-release.apk ~/MONTI_DROID_DATA/MontiDroid.apk
          echo "MONTIAI Deployment Complete"
      '''
      
      doLast {
          println "MONTIAI APK deployed successfully for MONTI-DROID System"
      }
  }
  
  // MONTIAI Clean task
  task clean(type: Delete) {
      delete rootProject.buildDir
  }
